services:
  - type: web
    name: sailing-community
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    plan: free
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sailing-db
          property: connectionString

databases:
  - name: sailing-db
    plan: free
